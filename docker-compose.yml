services:
  postgres:
    image: postgres:16-alpine
    container_name: regressor99-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: regressor99
      POSTGRES_PASSWORD: regressor99
      POSTGRES_DB: regressor99_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regressor99 -d regressor99_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

